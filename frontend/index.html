<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <meta name="theme-color" content="#fffaf9" />
  <meta name="description" content="Real-time, step-by-step guidance for hormonal contraception. Based on medical guidelines. Not a diagnosis." />

  <!-- Stitch typography: Outfit (display/headings) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <!-- Stitch iconography: Material Symbols Outlined -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet"
  />

  <!-- iOS / PWA: behave like a native, full-screen app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SafeCycle" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <title>SafeCycle</title>

  <!-- ============================================================
       SafeCycle backend URL -- set BEFORE any JS module loads so
       js/api.js picks it up via its window.SAFECYCLE_API_BASE
       precedence rule instead of computing it at module-eval time.

       Hardcoded per-environment because the previous runtime
       hostname detection inside api.js was unreliable in the
       deployed static environment (stale cache or unexpected
       hostname) and silently fell back to localhost, which broke
       sign-in. This inline script runs before app.js fetches
       api.js, so even an outdated api.js still uses the right
       backend.

       Local dev (`node serve.js` on :5500) keeps localhost:8000.
       Everything else points at the public Railway staging backend.
       Add the production frontend hostname here once it lands.
       ============================================================ -->
  <script>
    (function () {
      var host = window.location.hostname;
      if (host === "localhost" || host === "127.0.0.1") {
        window.SAFECYCLE_API_BASE = "http://localhost:8000";
      } else if (host === "safecycle-frontend-production.up.railway.app") {
        // Production frontend -> production backend. No trailing slash.
        window.SAFECYCLE_API_BASE =
          "https://safecycle-backend-production.up.railway.app";
      } else {
        // Staging (and any other Railway-hosted frontend) -> staging backend.
        window.SAFECYCLE_API_BASE =
          "https://backend-staging-staging-64b6.up.railway.app";
      }
    })();
  </script>

  <!-- Token layer first: this is the ONLY file to replace with Stitch tokens -->
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>
<body>
  <!-- App shell: fixed header + scrollable view region + safe-area aware -->
  <div id="app" class="app-shell">
    <header id="app-header" class="app-header" hidden>
      <button
        type="button"
        id="back-btn"
        class="icon-btn"
        aria-label="Go back"
        hidden
      >
        <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
      </button>
      <img class="app-header__logo" src="./assets/logo.png" alt="SafeCycle" />
      <span class="app-header__spacer"></span>
    </header>

    <main id="view" class="view" tabindex="-1" aria-live="polite">
      <!-- Views are rendered here by the router -->
    </main>

    <!-- Persistent bottom navigation -->
    <nav id="bottom-nav" class="bottom-nav" aria-label="Primary">
      <a href="#/home" class="bottom-nav__item" data-nav="home">
        <span class="material-symbols-outlined" aria-hidden="true">home</span>
        <span class="bottom-nav__label">Home</span>
      </a>
      <a href="#/catalog" class="bottom-nav__item" data-nav="catalog">
        <span class="material-symbols-outlined" aria-hidden="true">medical_services</span>
        <span class="bottom-nav__label">Catalog</span>
      </a>
      <a href="#/profile" class="bottom-nav__item" data-nav="profile">
        <span class="material-symbols-outlined" aria-hidden="true">person</span>
        <span class="bottom-nav__label">Profile</span>
      </a>
    </nav>
  </div>

  <!-- Always-available escalation overlay (Talk to a clinician) -->
  <div id="overlay-root"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>

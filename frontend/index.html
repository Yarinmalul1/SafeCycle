<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <meta name="theme-color" content="#fffaf9" />
  <meta name="description" content="Real-time, step-by-step guidance for hormonal contraception. Based on medical guidelines. Not a diagnosis." />

  <!-- Stitch typography: Outfit (display/headings) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <!-- Stitch iconography: Material Symbols Outlined -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet"
  />

  <!-- iOS / PWA: behave like a native, full-screen app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SafeCycle" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <title>SafeCycle</title>

  <!-- Token layer first: this is the ONLY file to replace with Stitch tokens -->
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>
<body>
  <!-- App shell: fixed header + scrollable view region + safe-area aware -->
  <div id="app" class="app-shell">
    <header id="app-header" class="app-header" hidden>
      <button
        type="button"
        id="back-btn"
        class="icon-btn"
        aria-label="Go back"
        hidden
      >
        <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
      </button>
      <img class="app-header__logo" src="./assets/icons/icon-192.png" alt="" />
      <span id="app-title" class="app-header__title">SafeCycle</span>
      <span class="app-header__spacer"></span>
      <a id="user-menu" class="icon-btn" href="#/profile" aria-label="Your profile">
        <span class="material-symbols-outlined" aria-hidden="true">account_circle</span>
      </a>
    </header>

    <main id="view" class="view" tabindex="-1" aria-live="polite">
      <!-- Views are rendered here by the router -->
    </main>

    <!-- Persistent bottom navigation -->
    <nav id="bottom-nav" class="bottom-nav" aria-label="Primary">
      <a href="#/dashboard" class="bottom-nav__item" data-nav="home">
        <span class="material-symbols-outlined" aria-hidden="true">home</span>
        <span class="bottom-nav__label">Home</span>
      </a>
      <a href="#/catalog" class="bottom-nav__item" data-nav="catalog">
        <span class="material-symbols-outlined" aria-hidden="true">medical_services</span>
        <span class="bottom-nav__label">Catalog</span>
      </a>
      <a href="#/profile" class="bottom-nav__item" data-nav="profile">
        <span class="material-symbols-outlined" aria-hidden="true">person</span>
        <span class="bottom-nav__label">Profile</span>
      </a>
    </nav>
  </div>

  <!-- Always-available escalation overlay (Talk to a clinician) -->
  <div id="overlay-root"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
